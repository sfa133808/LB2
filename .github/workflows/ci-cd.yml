name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Security - pip-audit
        run: |
          python -m pip install pip-audit
          python -m pip_audit --output-format json || true

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: CodeQL - Initialize
        uses: github/codeql-action/init@v2
        with:
          languages: python

      - name: CodeQL - Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: CodeQL - Analyze
        uses: github/codeql-action/analyze@v2
        continue-on-error: true

  docker-build-push:
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/lb2-render-app
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Security - Trivy scan filesystem
        uses: aquasecurity/trivy-action@v0.11.1
        with:
          scan-type: fs
          scan-ref: .
          image-ref: ghcr.io/${{ github.repository_owner }}/lb2-render-app:latest
          vuln-type: 'os,library'
          scanners: 'vuln'
          format: json
          output: trivy-report.json

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  deploy-render:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy Hooks
        env:
          RENDER_DEPLOY_HOOK_URL_API: ${{ secrets.RENDER_DEPLOY_HOOK_URL_API }}
          RENDER_DEPLOY_HOOK_URL_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_URL_FRONTEND }}
        run: |
          set -e
          any=false
          if [ -n "$RENDER_DEPLOY_HOOK_URL_API" ]; then
            echo "Triggering API deploy hook"
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL_API" || echo "API hook request failed"
            any=true
          fi
          if [ -n "$RENDER_DEPLOY_HOOK_URL_FRONTEND" ]; then
            echo "Triggering Frontend deploy hook"
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL_FRONTEND" || echo "Frontend hook request failed"
            any=true
          fi
          if [ "$any" = "false" ]; then
            echo "No deploy hook secrets set: RENDER_DEPLOY_HOOK_URL_API or RENDER_DEPLOY_HOOK_URL_FRONTEND"
            exit 1
          fi
