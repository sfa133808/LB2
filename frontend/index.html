<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyHub Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="background-glow"></div>
    <main class="layout">
      <header class="hero">
        <p class="eyebrow">StudyHub</p>
        <h1>Microservice Dashboard</h1>
        
      </header>

      <section class="cards" aria-label="Kennzahlen">
        <article class="stat-card">
          <h2>Benutzer</h2>
          <p id="usersTotal" class="value">-</p>
        </article>
        <article class="stat-card">
          <h2>Aufgaben</h2>
          <p id="tasksTotal" class="value">-</p>
        </article>
        <article class="stat-card">
          <h2>Offen</h2>
          <p id="openTasks" class="value">-</p>
        </article>
      </section>

      <section class="panel-grid">
        <article class="panel">
          <h3>Benutzer erstellen</h3>
          <form id="userForm" class="form">
            <label for="name">Name</label>
            <input id="name" name="name" required />

            <label for="email">E-Mail</label>
            <input id="email" name="email" type="email" required />

            <button type="submit">Benutzer speichern</button>
          </form>
        </article>

        <article class="panel">
          <h3>Aufgabe erstellen</h3>
          <form id="taskForm" class="form">
            <label for="userId">User ID</label>
            <input id="userId" name="userId" type="number" min="1" required />

            <label for="title">Titel</label>
            <input id="title" name="title" required />

            <label for="status">Status</label>
            <select id="status" name="status">
              <option value="todo">todo</option>
              <option value="in_progress">in_progress</option>
              <option value="done">done</option>
            </select>

            <button type="submit">Aufgabe speichern</button>
          </form>
        </article>
      </section>

      <section class="panel-grid">
        <article class="panel list-panel">
          <div class="panel-head">
            <h3>Benutzerliste</h3>
            <button id="refreshUsers" class="ghost">Neu laden</button>
          </div>
          <ul id="usersList" class="list"></ul>
        </article>

        <article class="panel list-panel">
          <div class="panel-head">
            <h3>Aufgabenliste</h3>
            <button id="refreshTasks" class="ghost">Neu laden</button>
          </div>
          <ul id="tasksList" class="list"></ul>
        </article>
      </section>

      <p id="toast" class="toast" role="status" aria-live="polite"></p>
    </main>
    <script>
      // Set API_BASE_URL based on deployment environment
      if (!window.API_BASE_URL) {
        const hostname = window.location.hostname;
        if (hostname.includes('onrender.com')) {
          // On Render: API is at https://lb2-render-app.onrender.com
          window.API_BASE_URL = 'https://lb2-render-app.onrender.com';
        } else if (hostname === 'localhost' || hostname === '127.0.0.1') {
          // Local development: API at localhost:8080
          window.API_BASE_URL = 'http://localhost:8080';
        } else {
          // Other environments: try to connect to api service on same network
          window.API_BASE_URL = `http://${hostname}:8080`;
        }
      }
    </script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
