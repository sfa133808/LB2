services:
  db:
    image: postgres:16-alpine
    container_name: lb2-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lb2app}
      POSTGRES_USER: ${POSTGRES_USER:-lb2user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lb2pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lb2user} -d ${POSTGRES_DB:-lb2app}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lb2-api-gateway
    env_file:
      - path: .env
        required: false
    environment:
      APP_NAME: ${APP_NAME:-StudyHub Gateway}
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      PORT: ${PORT:-8000}
      USERS_SERVICE_URL: http://users-service:8001
      TASKS_SERVICE_URL: http://tasks-service:8002
      ANALYTICS_SERVICE_URL: http://analytics-service:8003
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8000"
    depends_on:
      users-service:
        condition: service_healthy
      tasks-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.getenv(\"PORT\", \"8000\")}/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  users-service:
    build:
      context: .
      dockerfile: services/users_service/Dockerfile
    container_name: lb2-users-service
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 8001
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lb2user}:${POSTGRES_PASSWORD:-lb2pass}@db:5432/${POSTGRES_DB:-lb2app}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  tasks-service:
    build:
      context: .
      dockerfile: services/tasks_service/Dockerfile
    container_name: lb2-tasks-service
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 8002
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lb2user}:${POSTGRES_PASSWORD:-lb2pass}@db:5432/${POSTGRES_DB:-lb2app}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics_service/Dockerfile
    container_name: lb2-analytics-service
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 8003
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lb2user}:${POSTGRES_PASSWORD:-lb2pass}@db:5432/${POSTGRES_DB:-lb2app}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
