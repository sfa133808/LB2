services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lb2-render-app
    env_file:
      - path: .env
        required: false
    environment:
      APP_NAME: ${APP_NAME:-LB2 Render Demo}
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      PORT: ${PORT:-8000}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.getenv(\"PORT\", \"8000\")}/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
